name: Refresh Dashboard Data

on:
  schedule:
    - cron: '*/15 14-21 * * 1-5'  # every 15 min, 14:00-21:59 UTC (6AM-1PM PT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --upgrade yfinance requests pandas ccxt pycoingecko

      - name: Update dashboard data
        run: python examples/update_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/predictions/
          git commit -m "data: refresh $(date -u +%H:%M) UTC" || exit 0
          git push
